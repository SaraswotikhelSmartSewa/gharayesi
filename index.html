  /* ── RESET & BASE ───────────────────────────────────── */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{

  html{scroll-behavior:smooth}
  body{font-family:var(--font-body);background:var(--cream);color:var(--bark);min-height:100vh;overflow-x:hidden;visibility:hidden}

    pointer-events:none;z-index:9999}

  /* disable right-click / select on non-input elements */
  body{-webkit-user-select:none;user-select:none}
  input,textarea{-webkit-user-select:text;user-select:text}

  /* ── DEVICE HELPERS ─────────────────────────────────── */
  html[data-device=desktop] .mobile-only{display:none!important}
  html[data-device=mobile]  .desktop-only{display:none!important}

  .nav-links{display:flex;gap:32px;list-style:none}

  .hb2{width:220px;height:220px;background:var(--white);bottom:-70px;right:-50px}

  .header-inner{position:relative;z-index:2;max-width:1100px;margin:0 auto;

  .header-left{display:flex;flex-direction:column;gap:12px}
  html[data-device=mobile] .header-left{align-items:center}
  html[data-device=desktop] .header-left{align-items:flex-start;max-width:560px}
  .header-right{display:flex;flex-direction:column;gap:18px;align-items:flex-end;flex-shrink:0}

    background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);
    color:#fff;font-family:var(--font-mono);font-size:.67rem;letter-spacing:.13em;
    text-transform:uppercase;padding:5px 14px;border-radius:999px;
    backdrop-filter:blur(4px);animation:aDown .55s ease both}
  .nbadge .dot{width:6px;height:6px;border-radius:50%;background:var(--mango);animation:aPulse 2s infinite}
  @keyframes aPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.5}}

  html[data-device=mobile]  .shop-name{font-size:clamp(2.8rem,10vw,3.8rem)}
  html[data-device=desktop] .shop-name{font-size:clamp(3.4rem,5vw,5.2rem)}

  .tagline{color:rgba(255,255,255,.8);font-weight:300;line-height:1.65;animation:aDown .6s ease .15s both}

  html[data-device=desktop] .tagline{font-size:1.05rem;max-width:460px}
  .hstats{display:flex;gap:24px;animation:aDown .6s ease .22s both}

  html[data-device=desktop] .items-grid{grid-template-columns:repeat(4,1fr);gap:14px}

  .iname{font-weight:600;color:var(--bark)}

  html[data-device=desktop] .iname{font-size:.95rem}
  .iunit{font-size:.7rem;color:#8a6f5a}
  .iprice{font-family:var(--font-mono);font-weight:700;color:var(--leaf);white-space:nowrap;align-self:flex-start;margin-top:4px}
  html[data-device=mobile]  .iprice{font-size:.9rem}
  html[data-device=desktop] .iprice{font-size:1.05rem}
  .cur{font-size:.66rem;opacity:.75}
  .bhot{font-size:.57rem;background:var(--tomato);color:#fff;padding:1px 6px;border-radius:999px;

  .bsale{font-size:.57rem;background:var(--saffron);color:#3b2a1a;padding:1px 6px;border-radius:999px;

    line-height:1.65;margin-top:4px}

  /* ── WHY US ─────────────────────────────────────────── */

  .wa-float{position:fixed;bottom:28px;right:24px;z-index:500;

  .wa-tip{background:var(--bark);color:#fff;font-size:.77rem;font-weight:500;padding:7px 14px;

  .wa-circ:hover{transform:scale(1.1);box-shadow:0 10px 28px rgba(37,211,102,.6)}
  .wa-circ svg{width:30px;height:30px;fill:#fff;position:relative;z-index:1}
  @keyframes waPop{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
  @keyframes waRipple{0%{transform:scale(1);opacity:1}100%{transform:scale(2.2);opacity:0}}

  /* ── FOOTER ─────────────────────────────────────────── */

  .fbrand-name{font-family:var(--font-head);font-weight:900;color:#fff;line-height:1.1}

  html[data-device=desktop] .fbrand-name{font-size:1.9rem}
  .fbrand-name span{color:var(--mango)}
  .fbrand p{font-size:.82rem;line-height:1.7;margin-top:10px;max-width:260px}

  address{font-size:.83rem;line-height:2.05;font-style:normal}
  address strong{color:#fff}
  .hrow{display:flex;justify-content:space-between;gap:16px;font-size:.8rem;

  .hday{color:rgba(255,255,255,.48);font-size:.76rem}
  .htime{color:#fff;font-weight:500;font-family:var(--font-mono);font-size:.74rem}

  html[data-device=desktop] .fbot{flex-direction:row;justify-content:space-between;align-items:center}
  .fbot a{color:var(--mango);text-decoration:none}
  </style>
</head>

<script>
/* ── DEVICE ENGINE ──────────────────────────────────────── */
(function(){
  const BP=768;
  function classify(){
    const w=window.innerWidth,ua=navigator.userAgent;
    if(/android.*mobile|iphone|ipod|blackberry|windows phone/i.test(ua))return'mobile';
    const isT=/ipad|tablet|kindle|silk|playbook/i.test(ua)||(navigator.maxTouchPoints>1&&/macintosh/i.test(ua));
    if(isT)return w<BP?'mobile':'desktop';
    if(navigator.maxTouchPoints>0&&w<BP)return'mobile';
    return w>=BP?'desktop':'mobile';
  }
  let a=null;
  function apply(d){if(d===a)return;a=d;document.documentElement.setAttribute('data-device',d)}
  apply(classify());
  let t;window.addEventListener('resize',()=>{clearTimeout(t);t=setTimeout(()=>apply(classify()),80)});
  window.addEventListener('orientationchange',()=>setTimeout(()=>apply(classify()),150));
})();

/* ── SOURCE PROTECTION ──────────────────────────────────── */
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&['u','s','a'].includes(e.key.toLowerCase()))e.preventDefault();
  if(e.key==='F12')e.preventDefault();
});

/* ── LOAD CONFIG & RENDER ───────────────────────────────── */
const WA_SVG=`<svg viewBox="0 0 32 32"><path d="M16 2C8.268 2 2 8.268 2 16c0 2.47.664 4.786 1.82 6.78L2 30l7.44-1.79A13.93 13.93 0 0016 30c7.732 0 14-6.268 14-14S23.732 2 16 2zm7.41 19.02c-.31.87-1.54 1.59-2.53 1.8-.67.14-1.54.25-4.48-.96-3.76-1.54-6.19-5.35-6.38-5.6-.19-.25-1.54-2.05-1.54-3.91s.98-2.77 1.33-3.15c.35-.38.76-.48 1.01-.48.25 0 .51.002.73.012.23.01.55-.087.86.66.31.75 1.06 2.6 1.15 2.79.09.19.15.41.03.66-.12.25-.19.41-.38.63-.19.22-.4.49-.57.66-.19.19-.39.4-.17.78.22.38.99 1.63 2.12 2.64 1.46 1.3 2.69 1.7 3.07 1.9.38.19.6.16.82-.09.22-.25.95-1.11 1.2-1.49.25-.38.51-.31.86-.19.35.12 2.2 1.04 2.58 1.23.38.19.63.28.72.44.09.16.09.92-.22 1.79z"/></svg>`;

async function init(){
  let cfg;
  try{
    const r=await fetch('site-config.json?v='+Date.now());
    cfg=await r.json();
  }catch(e){
    document.body.innerHTML='<p style="padding:40px;font-family:sans-serif;color:red">Could not load site-config.json — make sure it is in the same folder as index.html.</p>';
    document.body.style.visibility='visible';
    return;
  }

  /* ── fonts ── */
  const {fonts,theme,meta,stats,hours,ticker,whyUs,sections,categories}=cfg;
  function injectFont(url){if(!url)return;const l=document.createElement('link');l.rel='stylesheet';l.href=url;document.head.appendChild(l);}
  injectFont(fonts.headingFontUrl);
  injectFont(fonts.bodyFontUrl);
  injectFont(fonts.monoFontUrl);
  if(fonts.useDevanagari)injectFont(fonts.devanagariUrl);

  /* ── CSS vars ── */
  const root=document.documentElement.style;
  root.setProperty('--cream',theme.colorCream);
  root.setProperty('--bark',theme.colorBark);
  root.setProperty('--leaf',theme.colorLeaf);
  root.setProperty('--saffron',theme.colorSaffron);
  root.setProperty('--mango',theme.colorMango);
  root.setProperty('--tomato',theme.colorTomato);
  root.setProperty('--sky',theme.colorSky);
  root.setProperty('--lavender',theme.colorLavender);
  root.setProperty('--chili',theme.colorChili);
  root.setProperty('--wa',theme.colorWhatsapp);
  root.setProperty('--bgWhy',theme.bgWhy);
  root.setProperty('--bgFooter',theme.bgFooter);
  root.setProperty('--font-head',`'${fonts.headingFont}',serif`);
  root.setProperty('--font-body',`'${fonts.bodyFont}',sans-serif`);
  root.setProperty('--font-mono',`'${fonts.monoFont}',monospace`);
  document.body.style.background=theme.bgMain;
  document.body.style.fontFamily=`'${fonts.bodyFont}',sans-serif`;
  document.body.style.fontSize=fonts.bodySize;

  /* ── meta ── */
  const waUrl=`https://wa.me/${meta.whatsappNumber}?text=${encodeURIComponent(meta.whatsappMessage)}`;
  document.title=meta.shopName+' — Saraswotikhel, Bhaktapur';
  document.querySelector('meta[name="description"]').content=meta.tagline;
  if(meta.faviconUrl){const f=document.createElement('link');f.rel='icon';f.href=meta.faviconUrl;document.head.appendChild(f);}

  function buildShopName(el,name,hl,spanStyle=''){
    if(!hl){el.textContent=name;return;}
    const i=name.indexOf(hl);
    if(i<0){el.textContent=name;return;}
    el.innerHTML=name.slice(0,i)+`<span${spanStyle?` style="${spanStyle}"`:''}>` +hl+'</span>'+name.slice(i+hl.length);
  }

  /* ── nav ── */
  const navBrand=document.getElementById('navBrand');
  if(meta.logoUrl){
    const img=document.createElement('img');img.src=meta.logoUrl;img.alt=meta.shopName;img.className='nav-logo';
    navBrand.innerHTML='';navBrand.appendChild(img);
  } else {
    buildShopName(navBrand,meta.shopName,meta.shopNameHighlight);
  }
  [document.getElementById('navCta'),document.getElementById('mwaHeader'),
   document.getElementById('dwaBtn'),document.getElementById('waMobileBar'),
   document.getElementById('waDesktopFloat')].forEach(el=>{if(el)el.href=waUrl});

  /* ── header ── */
  document.getElementById('hBadge').textContent=meta.badgeText;
  document.getElementById('hTagline').textContent=meta.tagline;
  document.getElementById('openSub').textContent=meta.location+' · NPT';
  if(meta.logoUrl){
    const img=document.createElement('img');img.src=meta.logoUrl;img.alt=meta.shopName;img.className='header-logo-img';
    document.getElementById('headerLogoWrap').appendChild(img);
  }
  buildShopName(document.getElementById('hShopName'),meta.shopName,meta.shopNameHighlight);
  document.getElementById('hStats').innerHTML=stats.map((s,i)=>
    `${i?'<div class="sdiv"></div>':''}<div class="stat"><span class="stat-n">${s.number}</span><span class="stat-l">${s.label}</span></div>`
  ).join('');

  /* ── ticker ── */
  const tc=document.getElementById('tickerTrack');
  const tkHtml=ticker.map(n=>`<span class="nc ${n.color}">◆ &nbsp;${n.text}</span><span class="nsep">✦</span>`).join('');
  tc.innerHTML=tkHtml+tkHtml;

  /* ── section texts ── */
  const secMap={};sections.forEach(s=>secMap[s.id]=s.text);
  function st(id){const el=document.getElementById(id);if(el)el.textContent=secMap[id]||'';}
  st('freshLabel');st('freshTitle');st('freshSub');st('whyLabel');st('whyTitle');
  document.getElementById('updateNote').innerHTML='<strong>'+secMap['update-note']+'</strong>';

  /* ── categories & products ── */
  const catRoot=document.getElementById('categoriesRoot');
  categories.forEach(cat=>{
    const grp=document.createElement('div');grp.className='cat-group';
    grp.innerHTML=`<div class="cat-head">
      <div class="cat-icon" style="background:${cat.iconBg}">${cat.icon}</div>
      <span class="cat-name">${cat.name}</span>
      <div class="cat-line"></div>
    </div>`;
    const grid=document.createElement('div');grid.className='items-grid';
    cat.items.forEach(item=>{
      const card=document.createElement('div');card.className='icard';
      const imgBlock=item.imageUrl
        ?`<img class="icard-img" src="${item.imageUrl}" alt="${item.name}" loading="lazy" onerror="this.style.display='none'">`
        :`<div class="icard-img-placeholder">${cat.icon}</div>`;
      const badge=item.badge==='hot'?'<span class="bhot">hot pick</span>':item.badge==='sale'?'<span class="bsale">sale</span>':'';
      card.innerHTML=`${imgBlock}
        <div class="icard-body">
          <div class="ileft">
            <span class="iname">${item.name}</span>
            <span class="iunit">${item.unit}</span>
            ${badge}
          </div>
          <span class="iprice"><span class="cur">Rs.</span> ${item.price}</span>
        </div>`;
      grid.appendChild(card);
    });
    grp.appendChild(grid);
    catRoot.appendChild(grp);
  });

  /* ── why us ── */
  document.getElementById('whyGrid').innerHTML=whyUs.map(w=>
    `<div class="wcard"><span class="wicon">${w.icon}</span><span class="wtitle">${w.title}</span><p class="wdesc">${w.desc}</p></div>`
  ).join('');

  /* ── footer ── */
  if(meta.logoUrl){
    const img=document.createElement('img');img.src=meta.logoUrl;img.alt=meta.shopName;img.className='footer-logo';
    document.getElementById('footerLogoWrap').appendChild(img);
  }
  buildShopName(document.getElementById('footerBrandName'),meta.shopName,meta.shopNameHighlight);
  document.getElementById('footerTagline').textContent=secMap['footer-brand-tagline']||meta.tagline;
  document.getElementById('footerAddress').innerHTML=
    `<strong>${meta.shopName}</strong><br>${meta.address.replace(/\n/g,'<br>')}<br><br>`+
    `<strong>📞</strong> ${meta.phone}<br><strong>💬</strong> WhatsApp same number`;
  document.getElementById('hoursRoot').innerHTML=hours.map(h=>
    `<div class="hrow"><span class="hday">${h.day}</span><span class="htime${h.closed?' closed':''}">${h.time}</span></div>`
  ).join('');
  const yr=new Date().getFullYear();
  document.getElementById('footerCopy').textContent=`© ${yr} ${meta.shopName} · Saraswotikhel, Bhaktapur`;
  document.getElementById('footerNote').innerHTML=`${secMap['footer-note']} · Hosted free on <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a>`;

  /* ── date & clock ── */
  document.getElementById('todayDate').textContent=new Date().toLocaleDateString('en-NP',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  function tickClock(){
    const el=document.getElementById('liveTime');
    if(el)el.textContent=new Date().toLocaleTimeString('en-NP',{timeZone:'Asia/Kathmandu',hour:'2-digit',minute:'2-digit',hour12:true});
  }
  tickClock();setInterval(tickClock,15000);
}

init();
</script>
